<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍄 GNOME CLICKER TURBO 9000 🍄</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}

:root{
  --c1:#ff2d78;--c2:#ff9500;--c3:#ffee00;--c4:#00ff88;
  --c5:#00ccff;--c6:#aa44ff;--c7:#ff44cc;--c8:#44ffaa;
}

body{
  background:#0a0010;
  font-family:'Fredoka One',cursive;
  overflow:hidden; height:100vh; width:100vw;
  cursor:none;
}

/* ── PSYCHEDELIC BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#particle-canvas{position:fixed;inset:0;z-index:50;pointer-events:none;}

/* ── CUSTOM CURSOR ── */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  width:40px;height:40px;margin:-20px 0 0 -20px;
  font-size:28px;line-height:40px;text-align:center;
  transition:transform 0.05s;
  filter:drop-shadow(0 0 8px #fff);
}
#cursor.clicked{transform:scale(0.6) rotate(30deg);}

/* ── DISCO FLOOR ── */
#disco-floor{
  position:fixed;bottom:0;left:0;right:0;
  height:80px;z-index:1;
  display:flex;
}
.disco-tile{
  flex:1; height:100%;
  animation:discoFlash 0.4s ease infinite;
  opacity:0.6;
}
@keyframes discoFlash{
  0%,100%{opacity:0.2;} 50%{opacity:0.9;}
}

/* ── LAYOUT ── */
#app{
  position:relative;z-index:10;
  height:100vh; width:100vw;
  display:grid;
  grid-template-columns:220px 1fr 220px;
  grid-template-rows:auto 1fr auto;
}

/* ── HEADER ── */
#header{
  grid-column:1/-1;
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to right,#ff2d7833,#aa44ff33,#00ccff33);
  border-bottom:2px solid;
  border-image:linear-gradient(to right,var(--c1),var(--c3),var(--c4),var(--c5),var(--c6)) 1;
  animation:headerShift 3s linear infinite;
}
@keyframes headerShift{
  0%{background:linear-gradient(to right,#ff2d7833,#aa44ff33,#00ccff33);}
  33%{background:linear-gradient(to right,#00ccff33,#ff2d7833,#ffee0033);}
  66%{background:linear-gradient(to right,#ffee0033,#00ff8833,#aa44ff33);}
  100%{background:linear-gradient(to right,#ff2d7833,#aa44ff33,#00ccff33);}
}

#title{
  font-family:'Bangers',cursive;
  font-size:2.2rem; letter-spacing:0.06em;
  background:linear-gradient(135deg,var(--c1),var(--c3),var(--c4),var(--c5),var(--c6),var(--c1));
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:rainbowText 2s linear infinite;
  text-shadow:none;
  filter:drop-shadow(0 0 10px #ff2d78aa);
}
@keyframes rainbowText{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

#score-display{text-align:center;}
#gnomes-count{
  font-family:'Bangers',cursive;
  font-size:2.8rem;
  line-height:1;
  animation:countPop 0.1s ease;
  display:block;
}
@keyframes countPop{
  0%{transform:scale(1.3);}100%{transform:scale(1);}
}
.rainbow-num{
  background:linear-gradient(90deg,var(--c1),var(--c3),var(--c4),var(--c5));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:rainbowText 1s linear infinite;
}
#gps-display{
  font-size:0.8rem;color:#ffffff88;
  font-family:'Fredoka One',cursive;
  letter-spacing:0.05em;
}

#combo-display{
  font-family:'Bangers',cursive;
  font-size:1.6rem;
  color:#ffee00;
  text-shadow:0 0 20px #ffee00,0 0 40px #ff9500;
  min-width:120px;text-align:center;
  transition:transform 0.15s;
}

/* ── LEFT PANEL — UPGRADES ── */
#left-panel{
  grid-column:1; grid-row:2;
  padding:12px 10px;
  background:#ffffff08;
  backdrop-filter:blur(4px);
  border-right:1px solid #ffffff15;
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column; gap:8px;
}
#left-panel::-webkit-scrollbar{width:4px;}
#left-panel::-webkit-scrollbar-thumb{background:#aa44ff66;border-radius:4px;}

.panel-title{
  font-family:'Bangers',cursive; font-size:1.1rem;
  text-align:center; letter-spacing:0.1em;
  padding:4px 0; margin-bottom:4px;
}

.upgrade-btn{
  background:linear-gradient(135deg,#1a0030,#0d001a);
  border:2px solid #aa44ff44;
  border-radius:10px; padding:8px 10px;
  cursor:pointer; transition:all 0.2s;
  display:flex; gap:8px; align-items:center;
  text-align:left;
}
.upgrade-btn:hover:not(:disabled){
  transform:scale(1.04) translateX(4px);
  border-color:var(--c6);
  box-shadow:0 0 15px #aa44ff66,inset 0 0 10px #aa44ff11;
}
.upgrade-btn:disabled{opacity:0.35;cursor:not-allowed;}
.upgrade-btn.affordable{
  border-color:#aa44ff;
  animation:affordPulse 1s ease-in-out infinite;
}
@keyframes affordPulse{
  0%,100%{box-shadow:0 0 8px #aa44ff44;}
  50%{box-shadow:0 0 20px #aa44ffcc,0 0 40px #aa44ff44;}
}
.upgrade-icon{font-size:1.6rem;flex-shrink:0;}
.upgrade-info{}
.upgrade-name{font-size:0.78rem;color:#fff;font-family:'Fredoka One',cursive;line-height:1.2;}
.upgrade-cost{font-size:0.7rem;color:#ffee00;}
.upgrade-desc{font-size:0.62rem;color:#ffffff66;line-height:1.3;}

/* ── CENTER ── */
#center{
  grid-column:2; grid-row:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; gap:16px;
}

/* ── GNOME ── */
#gnome-wrap{
  position:relative; cursor:pointer;
  animation:gnomeBob 2s ease-in-out infinite;
}
@keyframes gnomeBob{
  0%,100%{transform:translateY(0) rotate(-1deg);}
  50%{transform:translateY(-12px) rotate(1deg);}
}
#gnome-wrap.clicked{
  animation:gnomeClick 0.15s ease !important;
}
@keyframes gnomeClick{
  0%{transform:scale(1);}
  40%{transform:scale(0.82) rotate(-8deg);}
  100%{transform:scale(1.08) rotate(4deg);}
}
#gnome-wrap.rage{
  animation:gnomeRage 0.1s linear infinite !important;
}
@keyframes gnomeRage{
  0%{transform:translate(-3px,0) rotate(-5deg) scale(1.05);}
  25%{transform:translate(3px,-2px) rotate(5deg) scale(1.08);}
  50%{transform:translate(-2px,3px) rotate(-3deg) scale(1.04);}
  75%{transform:translate(2px,-1px) rotate(4deg) scale(1.07);}
  100%{transform:translate(-3px,0) rotate(-5deg) scale(1.05);}
}

/* Gnome SVG */
#gnome-svg{
  width:220px; height:280px;
  filter:drop-shadow(0 0 20px #ff2d78aa) drop-shadow(0 0 40px #aa44ff66);
  transition:filter 0.3s;
}
#gnome-wrap:hover #gnome-svg{
  filter:drop-shadow(0 0 30px #ffee00cc) drop-shadow(0 0 60px #ff9500aa);
}
#gnome-wrap.rage #gnome-svg{
  filter:drop-shadow(0 0 30px #ff0000dd) drop-shadow(0 0 60px #ff000088) brightness(1.3);
}

/* ── POWER BAR ── */
#power-bar-wrap{
  width:200px;
  background:#ffffff15;
  border-radius:20px; height:12px;
  border:1px solid #ffffff22; overflow:hidden;
}
#power-bar{
  height:100%; width:0%;
  background:linear-gradient(to right,var(--c1),var(--c3),var(--c4));
  border-radius:20px;
  transition:width 0.1s;
  animation:barShimmer 1s linear infinite;
  background-size:200%;
}
@keyframes barShimmer{
  0%{background-position:0%;}100%{background-position:200%;}
}
#power-label{font-size:0.65rem;color:#ffffff88;text-align:center;margin-top:3px;}

/* ── SPECIAL BTN ── */
#special-btn{
  background:linear-gradient(135deg,var(--c1),var(--c6));
  border:none; border-radius:12px;
  padding:10px 28px; font-family:'Bangers',cursive;
  font-size:1.3rem; letter-spacing:0.08em; color:#fff;
  cursor:pointer; transition:all 0.2s;
  box-shadow:0 0 20px var(--c1),0 4px 0 #88000088;
  opacity:0.4; pointer-events:none;
}
#special-btn.ready{
  opacity:1; pointer-events:all;
  animation:specialPulse 0.8s ease-in-out infinite;
}
@keyframes specialPulse{
  0%,100%{box-shadow:0 0 20px var(--c1),0 4px 0 #880000aa;}
  50%{box-shadow:0 0 50px var(--c1),0 0 80px var(--c6),0 4px 0 #880000aa;}
}
#special-btn.ready:hover{transform:scale(1.08) translateY(-3px);}

/* ── RIGHT PANEL — ACHIEVEMENTS / STATS ── */
#right-panel{
  grid-column:3; grid-row:2;
  padding:12px 10px;
  background:#ffffff08;
  backdrop-filter:blur(4px);
  border-left:1px solid #ffffff15;
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column; gap:8px;
}
#right-panel::-webkit-scrollbar{width:4px;}
#right-panel::-webkit-scrollbar-thumb{background:#ff2d7866;border-radius:4px;}

.stat-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 8px; border-radius:8px;
  background:#ffffff06; font-size:0.72rem;
}
.stat-label{color:#ffffff77;}
.stat-val{
  color:#ffee00; font-family:'Bangers',cursive;
  font-size:1rem; letter-spacing:0.03em;
}

.achievement{
  display:flex; gap:8px; align-items:center;
  padding:8px; border-radius:10px;
  border:1px solid #ffffff22;
  background:#ffffff06;
  transition:all 0.4s; opacity:0.4;
}
.achievement.unlocked{
  opacity:1; border-color:#ffee0066;
  background:linear-gradient(135deg,#1a1200,#2a2000);
  animation:achieveUnlock 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes achieveUnlock{
  0%{transform:scale(0.8) rotate(-5deg);opacity:0;}
  60%{transform:scale(1.1) rotate(2deg);}
  100%{transform:scale(1) rotate(0);}
}
.ach-icon{font-size:1.5rem;}
.ach-name{font-size:0.72rem;color:#fff;font-family:'Fredoka One',cursive;}
.ach-desc{font-size:0.6rem;color:#ffffff55;}

/* ── BOTTOM BAR ── */
#bottom-bar{
  grid-column:1/-1; grid-row:3;
  padding:8px 20px;
  display:flex; align-items:center; justify-content:center; gap:20px;
  background:#00000044;
  border-top:1px solid #ffffff11;
  font-size:0.7rem; color:#ffffff55;
}
.tip{
  animation:tipFade 4s ease-in-out infinite;
  font-family:'Fredoka One',cursive; letter-spacing:0.05em;
}
@keyframes tipFade{0%,100%{opacity:0.4;}50%{opacity:1;color:#ffee00;}}

/* ── FLOATING NUMBERS ── */
.float-num{
  position:fixed; pointer-events:none; z-index:200;
  font-family:'Bangers',cursive; font-size:1.6rem;
  font-weight:900; letter-spacing:0.03em;
  text-shadow:0 2px 8px #00000088;
  animation:floatUp 1.2s ease-out forwards;
  transform-origin:center;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(var(--rot));}
  60%{opacity:1;transform:translateY(-80px) scale(1.2) rotate(var(--rot2));}
  100%{opacity:0;transform:translateY(-130px) scale(0.6) rotate(var(--rot3));}
}

/* ── FLASH OVERLAY ── */
#flash{
  position:fixed;inset:0;z-index:80;pointer-events:none;
  opacity:0; transition:opacity 0.05s;
}

/* ── SCREEN SHAKE ── */
@keyframes shake{
  0%,100%{transform:translate(0,0);}
  10%{transform:translate(-6px,3px);}
  20%{transform:translate(6px,-3px);}
  30%{transform:translate(-4px,6px);}
  40%{transform:translate(4px,-4px);}
  50%{transform:translate(-6px,2px);}
  60%{transform:translate(6px,4px);}
  70%{transform:translate(-3px,-5px);}
  80%{transform:translate(3px,3px);}
  90%{transform:translate(-4px,-2px);}
}

/* ── MUSHROOM POWERUP ── */
.mushroom{
  position:fixed; z-index:60; font-size:2.5rem;
  cursor:pointer; animation:mushroomBounce 0.6s ease infinite alternate;
  filter:drop-shadow(0 0 12px #ff9500);
  transition:transform 0.1s;
}
.mushroom:hover{transform:scale(1.3) rotate(15deg)!important;}
@keyframes mushroomBounce{
  0%{transform:translateY(0) rotate(-5deg);}
  100%{transform:translateY(-15px) rotate(5deg);}
}

/* ── RAINBOW BORDER PULSE ── */
#app::after{
  content:'';
  position:fixed;inset:0;z-index:5;
  pointer-events:none;
  border:4px solid transparent;
  border-image:linear-gradient(var(--angle,0deg),var(--c1),var(--c3),var(--c4),var(--c5),var(--c6),var(--c1)) 1;
  animation:borderRotate 3s linear infinite;
}
@keyframes borderRotate{
  0%{--angle:0deg;}100%{--angle:360deg;}
}

/* ── RAGE FLASH BG ── */
.rage-flash{animation:rageFlash 0.15s linear infinite;}
@keyframes rageFlash{
  0%,100%{background-color:transparent;}
  50%{background-color:#ff000011;}
}

/* ── MULTIPLIER DISPLAY ── */
#multiplier{
  font-family:'Bangers',cursive; font-size:2.8rem;
  position:absolute; top:-20px; right:-40px;
  color:#ffee00;
  text-shadow:0 0 20px #ff9500, 0 0 40px #ff2d78;
  animation:multSpin 0.5s ease;
  pointer-events:none;
}
@keyframes multSpin{
  0%{transform:scale(0) rotate(-180deg);}
  70%{transform:scale(1.3) rotate(10deg);}
  100%{transform:scale(1) rotate(0);}
}

/* ── LEVEL UP BANNER ── */
#level-banner{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  z-index:500; pointer-events:none;
  font-family:'Bangers',cursive; font-size:5rem;
  text-align:center; letter-spacing:0.1em;
  background:linear-gradient(135deg,var(--c1),var(--c3),var(--c4),var(--c5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px #ffee00);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s;
  opacity:0;
}
#level-banner.show{
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<div id="flash"></div>
<div id="disco-floor"></div>
<div id="cursor">🔨</div>
<div id="level-banner">NIVEAU UP! 🎉</div>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="title">🍄 GNOME CLICKER TURBO 9000 🍄</div>
    <div id="score-display">
      <span id="gnomes-count" class="rainbow-num">0</span>
      <div id="gps-display">🍄 / sec : <span id="gps">0</span></div>
    </div>
    <div id="combo-display">x1</div>
  </div>

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-title" style="background:linear-gradient(135deg,var(--c6),var(--c5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
      ⚡ AMÉLIORATIONS ⚡
    </div>
    <div id="upgrades-list"></div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="gnome-wrap">
      <div id="multiplier" style="display:none"></div>
      <!-- GNOME SVG -->
      <svg id="gnome-svg" viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
        <!-- Shadow -->
        <ellipse cx="110" cy="270" rx="55" ry="10" fill="#00000055"/>
        <!-- Legs -->
        <rect x="75" y="210" width="28" height="55" rx="14" fill="#2244aa"/>
        <rect x="117" y="210" width="28" height="55" rx="14" fill="#2244aa"/>
        <!-- Shoes -->
        <ellipse cx="89" cy="265" rx="20" ry="10" fill="#331100"/>
        <ellipse cx="131" cy="265" rx="20" ry="10" fill="#331100"/>
        <!-- Body -->
        <path d="M60 160 Q55 120 65 100 Q80 70 110 65 Q140 70 155 100 Q165 120 160 160 Q140 180 110 182 Q80 180 60 160Z"
              fill="#cc4400" id="gnome-body"/>
        <!-- Belt -->
        <rect x="60" y="155" width="100" height="14" rx="5" fill="#442200"/>
        <rect x="102" y="152" width="16" height="20" rx="3" fill="#ffaa00"/>
        <!-- Arms -->
        <path d="M65 120 Q40 115 35 140 Q30 160 50 165" fill="none" stroke="#cc4400" stroke-width="18" stroke-linecap="round"/>
        <path d="M155 120 Q180 115 185 140 Q190 160 170 165" fill="none" stroke="#cc4400" stroke-width="18" stroke-linecap="round"/>
        <!-- Hands -->
        <circle cx="47" cy="167" r="13" fill="#ffcc88"/>
        <circle cx="173" cy="167" r="13" fill="#ffcc88"/>
        <!-- Neck -->
        <rect x="97" y="60" width="26" height="20" rx="5" fill="#ffcc88"/>
        <!-- Head -->
        <ellipse cx="110" cy="52" rx="42" ry="38" fill="#ffcc88" id="gnome-head"/>
        <!-- Eyes -->
        <ellipse cx="95" cy="50" rx="8" ry="9" fill="white" id="eye-l"/>
        <ellipse cx="125" cy="50" rx="8" ry="9" fill="white" id="eye-r"/>
        <circle cx="97" cy="51" r="5" fill="#1a1a44" id="pupil-l"/>
        <circle cx="127" cy="51" r="5" fill="#1a1a44" id="pupil-r"/>
        <circle cx="99" cy="49" r="2" fill="white"/>
        <circle cx="129" cy="49" r="2" fill="white"/>
        <!-- Eyebrows -->
        <path d="M87 40 Q95 36 103 40" fill="none" stroke="#443300" stroke-width="2.5" stroke-linecap="round" id="brow-l"/>
        <path d="M117 40 Q125 36 133 40" fill="none" stroke="#443300" stroke-width="2.5" stroke-linecap="round" id="brow-r"/>
        <!-- Nose -->
        <ellipse cx="110" cy="59" rx="7" ry="5" fill="#ffaa77"/>
        <!-- Mouth -->
        <path d="M98 68 Q110 76 122 68" fill="none" stroke="#cc6644" stroke-width="2.5" stroke-linecap="round" id="gnome-mouth"/>
        <!-- Cheeks -->
        <ellipse cx="88" cy="62" rx="9" ry="6" fill="#ff9988" opacity="0.5"/>
        <ellipse cx="132" cy="62" rx="9" ry="6" fill="#ff9988" opacity="0.5"/>
        <!-- Hat brim -->
        <ellipse cx="110" cy="18" rx="52" ry="12" fill="#22aa22"/>
        <!-- Hat body -->
        <path d="M65 18 Q70 -40 110 -45 Q150 -40 155 18Z" fill="#228822"/>
        <!-- Hat top jewel -->
        <circle cx="110" cy="-42" r="8" fill="#ffee00" id="hat-jewel"/>
        <circle cx="110" cy="-42" r="5" fill="#ff9500"/>
        <!-- Stars on hat -->
        <text x="82" y="5" font-size="12" fill="#ffee00">★</text>
        <text x="118" y="5" font-size="12" fill="#ffee00">★</text>
        <!-- Beard -->
        <path d="M78 75 Q65 95 70 120 Q80 140 95 135 Q110 130 125 135 Q140 140 150 120 Q155 95 142 75 Q130 68 110 70 Q90 68 78 75Z"
              fill="white" id="gnome-beard"/>
        <!-- Beard detail -->
        <path d="M85 95 Q95 110 110 108 Q125 110 135 95" fill="none" stroke="#dddddd" stroke-width="1.5"/>
        <path d="M88 115 Q100 125 110 123 Q120 125 132 115" fill="none" stroke="#dddddd" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- POWER BAR -->
    <div>
      <div id="power-bar-wrap"><div id="power-bar"></div></div>
      <div id="power-label">🔥 Jauge SUPER GNOME : 0%</div>
    </div>

    <!-- SPECIAL -->
    <button id="special-btn" onclick="activateSpecial()">⚡ SUPER GNOME FRENZY ⚡</button>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="panel-title" style="background:linear-gradient(135deg,var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
      🏆 STATS & TROPHÉES 🏆
    </div>
    <div class="stat-row"><span class="stat-label">🖱️ Clics totaux</span><span class="stat-val" id="s-clicks">0</span></div>
    <div class="stat-row"><span class="stat-label">🍄 Total gagné</span><span class="stat-val" id="s-total">0</span></div>
    <div class="stat-row"><span class="stat-label">⚡ Meilleur combo</span><span class="stat-val" id="s-combo">x1</span></div>
    <div class="stat-row"><span class="stat-label">🎯 Par clic</span><span class="stat-val" id="s-cpc">1</span></div>
    <div class="stat-row"><span class="stat-label">🚀 Passif/sec</span><span class="stat-val" id="s-gps">0</span></div>
    <div class="stat-row"><span class="stat-label">💣 Frenzies</span><span class="stat-val" id="s-frenzies">0</span></div>
    <hr style="border:none;border-top:1px solid #ffffff11;margin:4px 0;">
    <div id="achievements-list"></div>
  </div>

  <!-- BOTTOM -->
  <div id="bottom-bar">
    <span class="tip" id="tip-text">💡 Clique comme un fou pour remplir la jauge !</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let gnomes = 0, totalGnomes = 0, gps = 0;
let clickPower = 1, totalClicks = 0;
let combo = 1, comboTimer = null, maxCombo = 1;
let power = 0, specialActive = false, frenzies = 0;
let rageMode = false, clickStreak = 0, clickStreakTimer = null;

const tips = [

function renderUpgrades() {
  const list = document.getElementById('upgrades-list');
  list.innerHTML = '';
  UPGRADES.forEach(u => {
    const currentCost = Math.floor(u.cost * Math.pow(1.15, u.bought));
    const canAfford = gnomes >= currentCost;
    const btn = document.createElement('div');
    btn.className = 'upgrade-btn' + (canAfford ? ' affordable' : '');
    btn.innerHTML = `
      <div class="upgrade-icon">${u.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${u.name} <small style="color:#ffffff44">(${u.bought})</small></div>
        <div class="upgrade-cost">🍄 ${fmtNum(currentCost)}</div>
        <div class="upgrade-desc">${u.desc}</div>
      </div>`;
    if (!canAfford) btn.disabled = true;
    btn.addEventListener('click', () => buyUpgrade(u));
    list.appendChild(btn);
  });
}

function renderAchievements() {
  const list = document.getElementById('achievements-list');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'achievement' + (a.unlocked ? ' unlocked' : '');
    div.innerHTML = `
      <div class="ach-icon">${a.icon}</div>

  });
}

function updateStats() {
  document.getElementById('gnomes-count').textContent = fmtNum(Math.floor(gnomes));
  document.getElementById('gps').textContent = fmtNum(gps);
  document.getElementById('s-clicks').textContent = fmtNum(totalClicks);
  document.getElementById('s-total').textContent = fmtNum(Math.floor(totalGnomes));
  document.getElementById('s-combo').textContent = 'x'+maxCombo;
  document.getElementById('s-cpc').textContent = fmtNum(clickPower);
  document.getElementById('s-gps').textContent = fmtNum(gps);
  document.getElementById('s-frenzies').textContent = frenzies;
  document.getElementById('power-bar').style.width = power + '%';
  document.getElementById('power-label').textContent = `🔥 Jauge SUPER GNOME : ${Math.floor(power)}%`;
  document.getElementById('combo-display').textContent = combo > 1 ? `x${combo}` : 'x1';
  document.getElementById('combo-display').style.color = combo > 5 ? '#ff2d78' : combo > 2 ? '#ff9500' : '#ffee00';
}

function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1)+'G';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

// ═══════════════════════════════════════════════════════
// BUYING
// ═══════════════════════════════════════════════════════
function buyUpgrade(u) {
  const cost = Math.floor(u.cost * Math.pow(1.15, u.bought));
  if (gnomes < cost) return;
  gnomes -= cost;
  u.bought++;
  if (u.gpsBonus) gps += u.gpsBonus;
  if (u.cpBonus) clickPower += u.cpBonus;
  renderUpgrades();
  flashScreen('#aa44ff');
  spawnParticleBurst(window.innerWidth/2, window.innerHeight/2, 30, ['#aa44ff','#00ccff','#ffee00']);
  showLevelBanner(`${u.icon} Acheté !`);
}

// CLICK HANDLER
// ═══════════════════════════════════════════════════════
const gnomeWrap = document.getElementById('gnome-wrap');
gnomeWrap.addEventListener('click', handleClick);

function handleClick(e) {
  e.stopPropagation();
  const earned = clickPower * combo * (specialActive ? 3 : 1);
  gnomes += earned;
  totalGnomes += earned;
  totalClicks++;
  power = Math.min(100, power + 2.5);

  // Combo
  combo = Math.min(combo + 0.5, 20);
  maxCombo = Math.max(maxCombo, Math.floor(combo));
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 1; }, 1200);

  // Click streak for rage mode
  clickStreak++;
  clearTimeout(clickStreakTimer);
  clickStreakTimer = setTimeout(() => { clickStreak = 0; rageMode = false; gnomeWrap.classList.remove('rage'); }, 600);
  if (clickStreak >= 6) {
    rageMode = true;
    gnomeWrap.classList.add('rage');
  }

  // Animate gnome
  gnomeWrap.classList.remove('clicked');
  void gnomeWrap.offsetWidth;
  if (!rageMode) gnomeWrap.classList.add('clicked');
  setTimeout(() => gnomeWrap.classList.remove('clicked'), 200);

  // Particles
  const cx = e.clientX, cy = e.clientY;
  const count = Math.min(5 + Math.floor(combo), 20) * (rageMode ? 2 : 1);
  const colors = getRainbowColors();
  spawnParticleBurst(cx, cy, count, colors);

  // Float number
  const rot = (Math.random()-0.5)*30;
  spawnFloatNum(cx, cy, '+'+fmtNum(earned), colors[Math.floor(Math.random()*colors.length)], rot);

  // Flash
  if (Math.random() < 0.25 || combo >= 5) flashScreen(colors[0]);

  // Screen shake on high combo
  if (combo >= 8) shakeScreen();

  // Eyebrow / mouth reaction
  animateGnomeFace(combo);

  checkAchievements();
  renderUpgrades();
  updateStats();

  if (power >= 100) document.getElementById('special-btn').classList.add('ready');
}

// ═══════════════════════════════════════════════════════
// PARTICLE CANVAS
// ═══════════════════════════════════════════════════════
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;
const particles = [];

function spawnParticleBurst(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 2 + Math.random()*8;
    const size = 3 + Math.random()*7;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const shape = Math.random() < 0.4 ? 'star' : Math.random() < 0.5 ? 'circle' : 'square';
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 3,
      size, color, shape,
      life: 1, decay: 0.02 + Math.random()*0.03,
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.3,
      gravity: 0.15 + Math.random()*0.1,
    });
  }
}

function drawStar(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i*Math.PI*2/5) - Math.PI/2;
    const b = a + Math.PI/5;
    if (i===0) ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    else ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(b)*(r*0.4), y+Math.sin(b)*(r*0.4));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity; p.vx *= 0.98;
    p.life -= p.decay;
    p.rotation += p.rotSpeed;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    pCtx.save();
    pCtx.translate(p.x, p.y);
    pCtx.rotate(p.rotation);
    pCtx.globalAlpha = p.life;
    pCtx.shadowColor = p.color; pCtx.shadowBlur = 8;
    pCtx.fillStyle = p.color;
    if (p.shape === 'circle') {
      pCtx.beginPath(); pCtx.arc(0,0,p.size,0,Math.PI*2); pCtx.fill();
    } else if (p.shape === 'square') {
      pCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    } else {
      pCtx.restore();
      drawStar(pCtx, p.x, p.y, p.size, p.color, p.life);
      continue;
    }
    pCtx.restore();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ═══════════════════════════════════════════════════════
// BG CANVAS — psychedelic animated background
// ═══════════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

let bgT = 0;
const bgOrbs = Array.from({length:12}, () => ({
  x: Math.random()*window.innerWidth,
  y: Math.random()*window.innerHeight,
  r: 80+Math.random()*200,
  vx:(Math.random()-0.5)*0.8,
  vy:(Math.random()-0.5)*0.8,
  hue:Math.random()*360, hueSpeed:0.4+Math.random()*0.8,
}));

function animateBG(ts) {
  bgT = ts/1000;
  bgCtx.fillStyle = '#0a0010';
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  bgOrbs.forEach(o => {
    o.x += o.vx; o.y += o.vy;
    o.hue = (o.hue + o.hueSpeed) % 360;
    if (o.x < -o.r || o.x > bgCanvas.width+o.r) o.vx *= -1;
    if (o.y < -o.r || o.y > bgCanvas.height+o.r) o.vy *= -1;
    const g = bgCtx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0, `hsla(${o.hue},100%,60%,0.12)`);
    g.addColorStop(1, `hsla(${o.hue},100%,60%,0)`);
    bgCtx.fillStyle = g;
    bgCtx.beginPath(); bgCtx.arc(o.x,o.y,o.r,0,Math.PI*2); bgCtx.fill();
  });

  // Scanlines
  bgCtx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y=0; y<bgCanvas.height; y+=4) {
    bgCtx.fillRect(0,y,bgCanvas.width,1);
  }

  requestAnimationFrame(animateBG);
}
requestAnimationFrame(animateBG);

function getRainbowColors() {

    `hsl(${(t*60)%360},100%,60%)`,
    `hsl(${(t*60+60)%360},100%,60%)`,
    `hsl(${(t*60+120)%360},100%,60%)`,
    `hsl(${(t*60+180)%360},100%,60%)`,
    `hsl(${(t*60+240)%360},100%,60%)`,

}

// ═══════════════════════════════════════════════════════
// PASSIVE INCOME + GAME LOOP
// ═══════════════════════════════════════════════════════
let lastTick = Date.now();
function gameLoop() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  if (gps > 0) {
    const earned = gps * dt;
    gnomes += earned; totalGnomes += earned;
    if (Math.random() < dt * 0.8 && gps > 0) {
      const x = 100 + Math.random()*(window.innerWidth-200);
      const y = 80 + Math.random()*(window.innerHeight-160);
      spawnParticleBurst(x, y, 3, getRainbowColors());
    }
  }
  updateStats();
  renderUpgrades();
  checkAchievements();
  requestAnimationFrame(gameLoop);
}
