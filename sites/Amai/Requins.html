<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Base de données étendue des spécimens de requins.">
    <title>SharkPedia</title>
    <style>
        :root {
            --amai-bg: #f7f4ea; 
            --amai-dark: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--amai-bg);
            color: var(--amai-dark);
            font-family: 'Consolas', 'Courier New', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05));
            background-size: 100% 6px;
            pointer-events: none;
            z-index: 10;
        }

        .section-amai {
            position: relative;
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            background-color: var(--amai-bg);
            color: var(--amai-dark);
            overflow: hidden;
        }

        .grid-floor-amai {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.07) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.07) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: -1;
            animation: grid-move 4s infinite linear reverse;
        }

        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 800px;
        }

        .amai-title {
            font-size: 3.5rem;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 5px;
            color: var(--amai-dark);
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .amai-subtitle {
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 30px;
            border-bottom: 2px dashed var(--amai-dark);
            padding-bottom: 8px;
            display: inline-block;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            background: #fff;
            color: var(--amai-dark);
            border: 3px solid var(--amai-dark);
            box-shadow: 4px 4px 0px var(--amai-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--amai-dark);
        }

        .shark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .shark-card {
            background: #fff;
            border: 3px solid var(--amai-dark);
            box-shadow: 5px 5px 0px var(--amai-dark);
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }
        .shark-card.extinct .shark-habitat {
            color: red;
            border-color: red;
        }
        .shark-card:hover {
            box-shadow: 9px 9px 0px rgba(0,0,0,0.3);
            transform: translate(-4px, -4px);
        }

        .shark-img {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--amai-dark);
        }

        .shark-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .shark-name {
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .shark-scientific {
            font-size: 0.9rem;
            color: #555;
            font-style: italic;
        }

        .shark-habitat {
            margin-top: auto;
            font-size: 0.8rem;
            background: var(--amai-bg);
            border: 2px solid var(--amai-dark);
            padding: 6px 10px;
            font-weight: bold;
            display: inline-block;
            word-break: break-word;
        }

        /* --- EFFET BARRES 45° INVERSÉES--- */
        .section-amai::before,
        .section-amai::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 90px;
            background-color: #fff;
            mix-blend-mode: difference;
            z-index: 10;
            pointer-events: none;
        }

        .section-amai::before {
            top: 60px;
            left: -120px;
            transform: rotate(-45deg);
        }

        .section-amai::after {
            bottom: 60px;
            right: -120px;
            transform: rotate(-45deg);
        }

        .shark-card.blahaj-special {
            border: 3px dashed var(--amai-dark);
            background: #fffdf5;
            animation: swim-subtle 4s ease-in-out infinite;
        }

        .shark-card.blahaj-special .shark-habitat {
            background: #fff0f0;
            border-style: dashed;
        }

        @keyframes swim-subtle {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>

        const sharkGrid = document.getElementById('sharkGrid');
        const searchBar = document.getElementById('searchBar');

        function displaySharks(sharksList) {
            sharkGrid.innerHTML = "";

            if(sharksList.length === 0) {
                sharkGrid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>[ EXCEPTION: NO_SHARK_FOUND ]</p>";
                return;
            }

            sharksList.forEach(shark => {
                const card = document.createElement('div');
                card.className = `shark-card ${shark.isBlahaj ? 'blahaj-special' : ''} ${shark.isExtinct ? 'extinct' : ''}`;

                card.innerHTML = `
                    <div class="shark-img" style="background-image: url('${shark.image}')"></div>
                    <div class="shark-info">
                        <div class="shark-name">${shark.name} ${shark.isBlahaj ? '🏳️‍⚧️' : ''}</div>
                        <div class="shark-scientific">> ${shark.scientific}</div>
                        <div class="shark-habitat">LOC: ${shark.habitat}</div>
                    </div>
                `;
                sharkGrid.appendChild(card);
            });
        }

        searchBar.addEventListener('input', (e) => {
            const searchString = e.target.value.toLowerCase();
            const filteredSharks = sharks.filter(shark => {
                return (
                    shark.name.toLowerCase().includes(searchString) ||
                    shark.scientific.toLowerCase().includes(searchString) ||
                    shark.habitat.toLowerCase().includes(searchString)
                );
            });
            displaySharks(filteredSharks);
        });

        // Initialisation
        displaySharks(sharks);
