<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esprit TDAH</title>
    <style>
        /* Remise à zéro pour prendre tout l'écran */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        
        /* BOUTON RETOUR */
        #btn-retour {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background-color: white;
            border: 3px solid black;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }
        #btn-retour:hover {
            transform: scale(1.05);
        }
        #btn-retour svg {
            width: 30px;
            height: 30px;
            fill: black;
        }
    </style>
</head>
<body>
    <button id="btn-retour" onclick="window.history.back();" title="Retour">
        <svg viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
    </button>
<canvas id="mindCanvas"></canvas>

<script>
    const canvas = document.getElementById('mindCanvas');
    const ctx = canvas.getContext('2d');

    // Ajustement de la taille du canvas à l'écran
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Dictionnaire des pensées 100% centré sur le TSA et le TDAH
    const words = [
        "Hyperfocus", "Surcharge sensorielle", "Motifs", "Détails", 
        "Arborescence", "Dysfonction exécutive", "Vite !", "Bruit de fond", 
        "Masquage", "TDAH", "TSA", "Réseau", "Shutdown", "Meltdown", 
        "Logique", "Distraction", "Stimming", "Connexions", "Routine",
        "Idée fulgurante", "Dopamine", "Fatigue", "1000 à l'heure", 
        "Insomnie", "Intérêt spécifique", "Analyse", "Écholalie", 
        "Cécité temporelle", "Impulsivité", "Pensée divergente"
    ];

    // Palette de couleurs "Néon"
    const colors = ["#00ffff", "#ff00ff", "#ffff00", "#00ffaa", "#ffffff", "#ff4444"];

    class Thought {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            // Vitesse initiale élevée
            this.vx = (Math.random() - 0.5) * 6; 
            this.vy = (Math.random() - 0.5) * 6;
            this.text = words[Math.floor(Math.random() * words.length)];
            
            // On met les mots "TSA" et "TDAH" en plus grand
            this.size = (this.text === "TSA" || this.text === "TDAH") ? Math.random() * 20 + 30 : Math.random() * 15 + 10;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            
            // Timer d'impulsivité (TDAH) : temps avant de changer brusquement de direction
            this.timer = Math.random() * 80;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Effet TDAH : changement de direction soudain et chaotique
            this.timer--;
            if (this.timer < 0) {
                this.vx = (Math.random() - 0.5) * 10; // Accélération soudaine
                this.vy = (Math.random() - 0.5) * 10;
                this.timer = Math.random() * 60 + 10; // Nouveau cycle court
            }

            // Rebond sur les bords de l'écran pour rester enfermé dans "la tête"
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
            ctx.font = `${this.size}px 'Courier New'`;
            ctx.fillStyle = this.color;
            ctx.fillText(this.text, this.x, this.y);
        }
    }

    // Création d'une tempête de pensées
    const thoughts = [];
    const amountOfThoughts = 130; 

    for (let i = 0; i < amountOfThoughts; i++) {
        thoughts.push(new Thought());
    }

    function animate() {
        // Au lieu d'effacer tout l'écran, on dessine un rectangle noir semi-transparent.
        // Cela crée un effet de "rémanence" (les idées laissent une trace).
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Algorithme de Recherche de motifs (TSA)
        // Dessine des liens entre les pensées qui sont proches les unes des autres
        for (let i = 0; i < thoughts.length; i++) {
            for (let j = i + 1; j < thoughts.length; j++) {
                const dx = thoughts[i].x - thoughts[j].x;
                const dy = thoughts[i].y - thoughts[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Si deux idées se croisent, elles se connectent
                if (distance < 120) {
                    ctx.beginPath();
                    ctx.moveTo(thoughts[i].x, thoughts[i].y);
                    ctx.lineTo(thoughts[j].x, thoughts[j].y);
                    // L'opacité de la ligne dépend de la proximité
                    const alpha = 1 - (distance / 120);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // Mise à jour et dessin de chaque mot
        thoughts.forEach(thought => {
            thought.update();
            thought.draw();
        });

        // Boucle d'animation infinie
        requestAnimationFrame(animate);
    }

    // Lancer la machine
    animate();
</script>

</body>
</html>
