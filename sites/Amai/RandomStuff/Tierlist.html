        /* Un design volontairement d'un goût douteux avec la fameuse police Comic Sans */
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            margin: 20px;
        }

        h1 {
            color: #ff00ff;
            text-shadow: 3px 3px #00ffff;
            font-size: 2.5em;
        }

        .description {
            color: #ccff00;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* Structure de la tierlist */
        .tier-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 900px;
            margin: 0 auto;
            background-color: #333;
            padding: 15px;
            border: 5px double #ff00ff;
        }

        .tier-row {
            display: flex;
            background-color: #222;
            min-height: 100px;
            border: 1px solid #444;
        }

        /* Les labels avec les couleurs officielles des tierlists */
        .tier-label {
            width: 120px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 28px;
            color: #000;
            text-shadow: 1px 1px #fff;
            user-select: none;
        }

        .s-tier { background-color: #ff7f7f; }
        .a-tier { background-color: #ffbf7f; }
        .b-tier { background-color: #ffdf7f; }
        .c-tier { background-color: #ffff7f; }
        .d-tier { background-color: #7fff7f; }

        /* Zone de dépôt des images */
        .tier-dropzone {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            flex-grow: 1;
            min-height: 80px;
            background-color: #1c1c1c;
        }

        /* Conteneur d'image STRICTEMENT CARRÉ et de même taille */
        .item {
            width: 90px;
            height: 90px;
            position: relative;
            cursor: grab;
            border: 2px solid #fff;
            box-sizing: border-box;
            background-color: #000;
        }

        .item:active {
            cursor: grabbing;
        }

        /* Image carrée parfaite */
        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Coupe l'image pour qu'elle reste carrée sans déformer */
            display: block;
        }

        /* Petit texte explicatif sur l'image */
        .item .caption {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            width: 100%;
            font-size: 10px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* La zone du bas pour stocker les trucs à classer */
        #item-bank {
            margin: 40px auto;
            max-width: 900px;
            border: 3px dashed #00ffff;
            padding: 20px;
            background-color: #2b2b2b;
            min-height: 120px;
        }

        h2 {
            color: #00ffff;
        }
    </style>

        const bank = document.getElementById('item-bank');

        // Génération automatique des éléments
        itemsData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.draggable = true;
            div.id = item.id;
            
            div.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <div class="caption">${item.name}</div>
            `;

            // Événement début du Drag
            div.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', div.id);
            });

            // Placement initial demandé
            const targetZone = document.getElementById(item.startZone);
            if (targetZone) {
                targetZone.appendChild(div);
            } else {
                bank.appendChild(div);
            }
        });

        // Gestion du Drag and Drop sur toutes les zones
        const zones = document.querySelectorAll('.tier-dropzone');
        zones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                // Obligatoire pour autoriser le dépôt
                e.preventDefault();
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text/plain');
                const draggedElement = document.getElementById(id);
                
                if (draggedElement) {
                    // On s'assure d'ajouter à la zone et pas SUR une autre image
                    if (e.target.classList.contains('tier-dropzone')) {
                        e.target.appendChild(draggedElement);
                    } else {
                        e.target.closest('.tier-dropzone').appendChild(draggedElement);
                    }
                }
            });
        });
