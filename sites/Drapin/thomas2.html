<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Les Grosses B...</title>

<style>
#menu{

position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

gap:20px;

background:rgba(5,8,22,.95);

z-index:100;

backdrop-filter:blur(10px);

}

#menu h1{

color:white;
font-size:60px;

text-shadow:

0 0 20px cyan,
0 0 50px blue;

}

#nameInput{

width:320px;

padding:18px;

font-size:24px;

border:none;

border-radius:15px;

text-align:center;

outline:none;

background:#111827;

color:white;

box-shadow:

0 0 20px rgba(0,255,255,.3);

}

#startBtn{

padding:18px 45px;

font-size:24px;

border:none;

border-radius:50px;

cursor:pointer;

color:white;

background:linear-gradient(45deg,#00d4ff,#4b00ff,#ff0088);

background-size:300%;

animation:bg 6s linear infinite;

box-shadow:

0 0 25px cyan;

transition:.25s;

}

#startBtn:hover{

transform:scale(1.08);

}
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#050816;

font-family:Arial;

transition:background .3s;

}

canvas{

position:fixed;
inset:0;

}

button{

position:relative;

z-index:10;

padding:22px 80px;

font-size:34px;
font-weight:bold;

border:none;

border-radius:70px;

cursor:pointer;

color:white;

background:linear-gradient(45deg,#00e5ff,#4b00ff,#ff0088);

background-size:400%;

animation:bg 6s linear infinite;

box-shadow:

0 0 20px cyan,
0 0 50px blue,
0 0 90px purple;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

@keyframes bg{

to{

background-position:400%;

}

}

#title{

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%) scale(.2);

font-size:12vw;

font-weight:900;

pointer-events:none;

opacity:0;

transition:1.2s cubic-bezier(.2,1.4,.3,1);

text-shadow:

0 0 20px white,
0 0 40px cyan,
0 0 70px blue,
0 0 140px magenta;

}

</style>

</head>
<body>

<canvas id="c"></canvas>

<div id="menu">

    <h1>✨ Bienvenue ✨</h1>

    <input
        id="nameInput"
        type="text"
        placeholder="Entre ton nom..."
        maxlength="20"
    >

    <button id="startBtn">Commencer</button>

</div>

<div id="title"></div>

<button id="btn" style="display:none;"></button>

</body>
<script>
const title=document.getElementById("title");
const btn=document.getElementById("btn");

const menu=document.getElementById("menu");
const input=document.getElementById("nameInput");
const start=document.getElementById("startBtn");

let playerName="Thomas";

start.onclick=launch;
input.addEventListener("keydown",e=>{

if(e.key==="Enter")
launch();

});

function launch(){

playerName=input.value.trim();

if(playerName==="")
playerName="Thomas";

title.textContent=playerName;
btn.textContent=playerName;

menu.style.display="none";
btn.style.display="block";

}
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

resize();

addEventListener("resize",resize);

const particles=[];

class Particle{

constructor(x,y){

const a=Math.random()*Math.PI*2;

const s=Math.random()*18+2;

this.x=x;
this.y=y;

this.vx=Math.cos(a)*s;
this.vy=Math.sin(a)*s;

this.r=Math.random()*4+2;

this.life=250;

this.h=Math.random()*360;

}

update(){

this.x+=this.vx;
this.y+=this.vy;

this.vx*=0.995;
this.vy*=0.995;

if(this.x<0||this.x>canvas.width)this.vx*=-1;
if(this.y<0||this.y>canvas.height)this.vy*=-1;

this.life--;

}

draw(){

ctx.beginPath();

ctx.fillStyle=`hsla(${this.h},100%,60%,${this.life/250})`;

ctx.arc(this.x,this.y,this.r,0,Math.PI*2);

ctx.fill();

}

}

let wave=0;
let hue=0;

function loop(){

requestAnimationFrame(loop);

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=particles.length-1;i>=0;i--){

particles[i].update();

particles[i].draw();

if(particles[i].life<=0)
particles.splice(i,1);

}

if(wave>0){

ctx.beginPath();

ctx.strokeStyle=`hsla(${hue},100%,70%,${1-wave/700})`;

ctx.lineWidth=8;

ctx.arc(canvas.width/2,canvas.height/2,wave,0,Math.PI*2);

ctx.stroke();

wave+=20;

if(wave>700)wave=0;

}

}

loop();

btn.onclick=()=>{

const r=btn.getBoundingClientRect();

const x=r.left+r.width/2;

const y=r.top+r.height/2;

for(let i=0;i<400;i++)
particles.push(new Particle(x,y));

wave=10;

btn.animate([

{

transform:"scale(1) rotate(0deg)"

},

{

transform:"scale(.4) rotate(360deg)"

},

{

transform:"scale(1.2) rotate(720deg)"

},

{

transform:"scale(1)"

}

],{

duration:900,
easing:"cubic-bezier(.2,1.3,.3,1)"

});

title.textContent=playerName;
title.style.opacity=1;
title.style.transform="translate(-50%,-50%) scale(1)";

let t=0;

const rgb=setInterval(()=>{

hue+=3;

document.body.style.background=`hsl(${hue},55%,8%)`;

title.style.color=`hsl(${hue},100%,70%)`;

title.style.transform=
`translate(-50%,-50%) scale(${1+Math.sin(t)*0.12}) rotate(${Math.sin(t)*4}deg)`;

t+=0.15;

},16);

setTimeout(()=>{

clearInterval(rgb);

title.style.opacity=0;

title.style.transform="translate(-50%,-50%) scale(.2)";

document.body.style.background="#050816";

},4000);

};

</script>
</html>
